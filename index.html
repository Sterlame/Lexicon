<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #16161e;
    --surface2: #1c1c26;
    --border: #2a2a36;
    --border2: #22222c;
    --text: #e8e4dc;
    --text2: #c8c4bc;
    --text3: #888;
    --text4: #555;
    --text5: #333;
    --noun: #6B7FD7;
    --verb: #5BAD8A;
    --adj: #C47A3B;
    --adv: #9B6BB5;
    --accent: #4a7a8a;
    --gold: #c9a84c;
    --nudge: #8a5a3a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 64px;
  }

  header {
    width: 100%;
    max-width: 640px;
    padding: 36px 0 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
  }

  .logo-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text4);
    margin-bottom: 4px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .logo-name {
    font-size: 22px;
    font-weight: bold;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }

  .streak-badge .streak-num {
    font-size: 15px;
    font-weight: bold;
    color: var(--gold);
  }

  nav {
    width: 100%;
    max-width: 640px;
    display: flex;
    gap: 4px;
    padding: 20px 0 0;
  }

  nav button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text4);
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: capitalize;
    position: relative;
  }

  nav button.active {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text);
  }

  .dict-count {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--noun);
    color: white;
    border-radius: 10px;
    font-size: 10px;
    padding: 1px 5px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.4;
  }

  main {
    width: 100%;
    max-width: 640px;
    padding-top: 28px;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ── TODAY ── */
  .date-label {
    font-size: 12px;
    color: var(--text5);
    margin-bottom: 24px;
    letter-spacing: 0.06em;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    margin-bottom: 12px;
  }

  .word-headline {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .word-title {
    font-size: 46px;
    font-weight: bold;
    color: #f0ece4;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }

  .pos-tag {
    font-size: 12px;
    border-radius: 20px;
    padding: 2px 10px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.04em;
  }

  .pronunciation {
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    margin-bottom: 6px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.04em;
  }

  .etymology {
    font-size: 11px;
    color: var(--text5);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.04em;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .definition {
    font-size: 17px;
    line-height: 1.7;
    color: var(--text2);
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border2);
  }

  .example-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 24px;
  }

  .example-bar {
    width: 2px;
    min-height: 32px;
    border-radius: 2px;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .example-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text3);
    font-style: italic;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 20px;
    border-top: 1px solid var(--border2);
  }

  .btn {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text4);
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .btn:hover { border-color: var(--text4); color: var(--text3); }

  .btn-save {
    color: var(--noun);
    border-color: #6B7FD730;
    background: #6B7FD710;
  }
  .btn-save:hover { background: #6B7FD720; border-color: #6B7FD760; color: var(--noun); }
  .btn-save.saved { opacity: 0.5; cursor: default; }

  .btn-used {
    color: var(--verb);
    border-color: #5BAD8A30;
    background: #5BAD8A10;
  }
  .btn-used:hover { background: #5BAD8A20; border-color: #5BAD8A60; color: var(--verb); }
  .btn-used.done { opacity: 0.5; cursor: default; }

  .meta-line {
    font-size: 12px;
    color: var(--text5);
    text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  /* ── HISTORY ── */
  .section-label {
    font-size: 13px;
    color: var(--text4);
    margin-bottom: 24px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .history-list, .dict-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 18px 22px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .history-card .hw { flex: 1; }

  .history-word {
    font-size: 19px;
    font-weight: bold;
    color: #dbd7cf;
    margin-right: 8px;
  }

  .history-pos {
    font-size: 11px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.05em;
  }

  .history-def {
    font-size: 13px;
    color: var(--text3);
    line-height: 1.55;
    margin-top: 4px;
  }

  .history-meta {
    font-size: 11px;
    color: var(--text5);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    flex-shrink: 0;
    padding-top: 3px;
    letter-spacing: 0.04em;
    text-align: right;
    line-height: 1.6;
  }

  .load-more {
    margin-top: 16px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text4);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }

  .empty-state {
    color: var(--text4);
    font-size: 15px;
    text-align: center;
    margin-top: 48px;
    line-height: 1.8;
  }

  .empty-state small {
    font-size: 13px;
    color: var(--text5);
    display: block;
  }

  /* ── MY DICTIONARY ── */
  .nudge-banner {
    background: #8a5a3a18;
    border: 1px solid #8a5a3a40;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #c47a3b;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.6;
  }

  .nudge-banner strong {
    display: block;
    margin-bottom: 6px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .nudge-words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .nudge-chip {
    background: #8a5a3a20;
    border: 1px solid #8a5a3a50;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    color: #c47a3b;
    font-style: italic;
  }

  .dict-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 18px 22px;
  }

  .dict-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }

  .dict-word { font-size: 20px; font-weight: bold; color: #dbd7cf; }
  .dict-pos { font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.05em; margin-left: 6px; }
  .dict-def { font-size: 13px; color: var(--text3); line-height: 1.55; margin-bottom: 12px; }

  .dict-stats {
    display: flex;
    gap: 16px;
    font-size: 11px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text5);
    letter-spacing: 0.04em;
    flex-wrap: wrap;
    padding-top: 10px;
    border-top: 1px solid var(--border2);
    align-items: center;
  }

  .dict-stat-streak { color: var(--gold); font-weight: bold; }

  .dict-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-sm {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text4);
    transition: all 0.15s;
  }

  .btn-sm.used-today {
    color: var(--verb);
    border-color: #5BAD8A40;
    background: #5BAD8A10;
  }

  .btn-remove {
    color: #664444;
    border-color: transparent;
  }
  .btn-remove:hover { color: #aa5555; border-color: #aa555540; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-label">Word of the Day</div>
    <div class="logo-name">Lexicon</div>
  </div>
  <div class="streak-badge">
    🔥 <span class="streak-num" id="streakNum">0</span> day streak
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('today')">Today</button>
  <button onclick="showPage('history')">History</button>
  <button onclick="showPage('dictionary')" style="position:relative">
    My Dictionary
    <span class="dict-count" id="dictCount" style="display:none"></span>
  </button>
</nav>

<main>
  <!-- TODAY -->
  <div class="page active" id="page-today">
    <div class="date-label" id="dateLabel"></div>
    <div class="word-card" id="wordCard"></div>
    <div class="meta-line" id="metaLine"></div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div class="section-label">Previous words</div>
    <div id="historyContent"></div>
  </div>

  <!-- MY DICTIONARY -->
  <div class="page" id="page-dictionary">
    <div id="nudgeBanner"></div>
    <div class="section-label" id="dictLabel">Saved words</div>
    <div id="dictContent"></div>
  </div>
</main>

<script>
const WORDS = [
  { word: "Vellichor", pronunciation: "VEL-ih-kor", pos: "noun", etymology: "From John Koenig, The Dictionary of Obscure Sorrows", definition: "The strange wistfulness of used bookshops, filled with the sense of all the lives and worlds contained in their pages.", example: "She lingered in the doorway, overcome by vellichor, not ready to leave." },
  { word: "Sonder", pronunciation: "SON-der", pos: "noun", etymology: "From John Koenig, The Dictionary of Obscure Sorrows", definition: "The realization that each passerby has a life as vivid and complex as your own.", example: "Watching the crowd from the overpass, he felt a wave of sonder wash over him." },
  { word: "Liminal", pronunciation: "LIM-in-ul", pos: "adjective", etymology: "Latin limen, threshold", definition: "Occupying a transitional or intermediate position; relating to a threshold or boundary between states.", example: "The hours between midnight and dawn felt profoundly liminal, belonging to neither day nor night." },
  { word: "Apophenia", pronunciation: "ap-oh-FEE-nee-uh", pos: "noun", etymology: "Greek apo-, away + phainein, to show", definition: "The tendency to perceive meaningful connections between unrelated things.", example: "Seeing faces in clouds is a harmless form of apophenia." },
  { word: "Concatenate", pronunciation: "kon-KAT-en-ayt", pos: "verb", etymology: "Latin con-, together + catena, chain", definition: "To link things together in a chain or series.", example: "She concatenated her observations into a single, lucid argument." },
  { word: "Susurrus", pronunciation: "suh-SUR-us", pos: "noun", etymology: "Latin susurrare, to whisper or murmur", definition: "A soft murmuring or whispering sound.", example: "The susurrus of leaves filled the otherwise silent trail." },
  { word: "Palimpsest", pronunciation: "PAL-imp-sest", pos: "noun", etymology: "Greek palimpsestos, scraped again", definition: "Something altered or reused but still bearing visible traces of its earlier form.", example: "The city itself was a palimpsest — new glass towers rising over cobblestone lanes." },
  { word: "Fugacious", pronunciation: "fyoo-GAY-shus", pos: "adjective", etymology: "Latin fugax, fleeing, from fugere, to flee", definition: "Fleeting; tending to disappear quickly.", example: "The scent of rain on dry earth is fugacious, gone almost before you notice it." },
  { word: "Numinous", pronunciation: "NOO-mih-nus", pos: "adjective", etymology: "Latin numen, divine will or spirit", definition: "Having a strong spiritual or mysterious quality; evoking a sense of the divine or sublime.", example: "The fog-draped mountain had a numinous quality that silenced the group." },
  { word: "Tendentious", pronunciation: "ten-DEN-shus", pos: "adjective", etymology: "Latin tendere, to stretch or aim at", definition: "Promoting a particular point of view; biased in a way that is not openly acknowledged.", example: "The documentary was compelling but unmistakably tendentious." },
  { word: "Apocryphal", pronunciation: "uh-POK-rih-ful", pos: "adjective", etymology: "Greek apokryptein, to hide away", definition: "Of doubtful authenticity; widely circulated but unlikely to be true.", example: "The story of his escape was almost certainly apocryphal, but it made for good telling." },
  { word: "Lacunae", pronunciation: "luh-KYOO-nee", pos: "noun", etymology: "Latin lacuna, pit or pool", definition: "Gaps or missing portions, especially in a manuscript, text, or argument.", example: "The historical record has significant lacunae around that period." },
  { word: "Pellucid", pronunciation: "peh-LOO-sid", pos: "adjective", etymology: "Latin pellucidus, from per-, through + lucere, to shine", definition: "Transparently clear; easily understood.", example: "Her pellucid explanation cut through weeks of confusion in minutes." },
  { word: "Oscitant", pronunciation: "OS-ih-tant", pos: "adjective", etymology: "Latin oscitare, to yawn", definition: "Drowsy and inattentive; showing a lack of interest or alertness.", example: "The audience grew oscitant after the third hour of proceedings." },
  { word: "Fugue", pronunciation: "fyoog", pos: "noun", etymology: "Latin fuga, flight", definition: "A state of dissociation or altered consciousness; a flight from one's own identity.", example: "He moved through the following days in a kind of fugue, barely registering events around him." },
  { word: "Effulgent", pronunciation: "ih-FUL-jent", pos: "adjective", etymology: "Latin effulgere, to shine out", definition: "Radiant; shining brilliantly.", example: "The effulgent afternoon light made the whole valley look painted." },
  { word: "Plangent", pronunciation: "PLAN-jent", pos: "adjective", etymology: "Latin plangere, to beat or lament", definition: "Having a loud, reverberating sound; deeply expressive of grief or sorrow.", example: "The cello's plangent tone carried across the empty hall." },
  { word: "Quiddity", pronunciation: "KWID-ih-tee", pos: "noun", etymology: "Latin quidditas, from quid, what", definition: "The inherent nature or essence of a thing; a distinctive feature.", example: "The quiddity of good design is that it disappears — you notice only what it enables." },
  { word: "Recondite", pronunciation: "REK-on-dyt", pos: "adjective", etymology: "Latin reconditus, hidden away", definition: "Not known by many people; dealing with obscure subject matter.", example: "His recondite knowledge of Byzantine coinage impressed even specialists." },
  { word: "Sybaritic", pronunciation: "sib-uh-RIT-ik", pos: "adjective", etymology: "Greek Sybaris, an ancient city known for luxury", definition: "Fond of sensuous luxury and pleasure.", example: "The sybaritic excess of the estate was embarrassing even to its owner." },
  { word: "Tergiversate", pronunciation: "ter-JIV-er-sayt", pos: "verb", etymology: "Latin tergiversari, to turn one's back", definition: "To make conflicting or evasive statements; to change one's loyalties.", example: "When pressed for a direct answer, he began to tergiversate." },
  { word: "Velleity", pronunciation: "veh-LEE-ih-tee", pos: "noun", etymology: "Latin velle, to wish", definition: "A very slight wish or inclination that lacks the motivation to act on it.", example: "Writing a novel remained a velleity — thought of often, pursued never." },
  { word: "Anfractuous", pronunciation: "an-FRAK-choo-us", pos: "adjective", etymology: "Latin anfractus, a winding", definition: "Winding; circuitous; full of twists and turns.", example: "The anfractuous path through the argument eventually arrived somewhere worthwhile." },
  { word: "Bathetic", pronunciation: "buh-THET-ik", pos: "adjective", etymology: "Greek bathos, depth", definition: "Producing an effect of anticlimax; absurdly abrupt in descent from the elevated to the ordinary.", example: "The film's ending was bathetic — a soaring score over footage of a man eating cereal." },
  { word: "Crepuscular", pronunciation: "kreh-PUS-kyoo-ler", pos: "adjective", etymology: "Latin crepusculum, twilight", definition: "Relating to or resembling twilight; dim; active at dawn or dusk.", example: "Deer are crepuscular animals, most active in the hour before and after dark." },
  { word: "Defenestrate", pronunciation: "dee-FEN-es-trayt", pos: "verb", etymology: "Latin de-, out of + fenestra, window", definition: "To throw someone or something out of a window; informally, to remove from a position of power.", example: "The board effectively defenestrated the founder, though the meeting room was on the ground floor." },
  { word: "Ersatz", pronunciation: "ER-zatz", pos: "adjective", etymology: "German Ersatz, replacement or substitute", definition: "Made or used as a substitute; typically inferior to the real thing.", example: "The ersatz coffee served at the conference was barely worth the cup it came in." },
  { word: "Frangible", pronunciation: "FRAN-jih-bul", pos: "adjective", etymology: "Latin frangere, to break", definition: "Fragile; easily broken.", example: "Trust, once frangible, rarely reconstitutes exactly as it was." },
  { word: "Gossamer", pronunciation: "GOS-uh-mer", pos: "adjective", etymology: "Middle English goce somer, goose summer (warm autumn weather)", definition: "Light, delicate, and translucent; very light and insubstantial.", example: "The fog was gossamer in the early light, more suggestion than substance." },
  { word: "Haecceity", pronunciation: "hek-SEE-ih-tee", pos: "noun", etymology: "Medieval Latin haecceitas, from haec, this", definition: "The quality that makes something the particular thing it is; 'thisness'.", example: "Philosophers debate whether identical twins share or divide haecceity." },
  { word: "Ineluctable", pronunciation: "in-ih-LUK-tuh-bul", pos: "adjective", etymology: "Latin ineluctabilis, from in-, not + eluctari, to struggle out", definition: "Unable to be resisted or avoided; inescapable.", example: "There was an ineluctable logic to the outcome that none of them had wanted to admit." },
  { word: "Jentacular", pronunciation: "jen-TAK-yoo-ler", pos: "adjective", etymology: "Latin jentaculum, breakfast", definition: "Relating to or suited for breakfast.", example: "His jentacular routine — strong coffee, two eggs, silence — was non-negotiable." },
  { word: "Kenopsia", pronunciation: "keh-NOP-see-uh", pos: "noun", etymology: "From John Koenig, The Dictionary of Obscure Sorrows", definition: "The eerie atmosphere of a place that is usually busy but is now empty and quiet.", example: "The school hallways in summer had a kenopsia he never quite got used to." },
  { word: "Luculent", pronunciation: "LOO-kyoo-lent", pos: "adjective", etymology: "Latin luculentus, from lux, light", definition: "Clearly expressed; lucid.", example: "The judge's ruling was luculent — no ambiguity, no room for appeal." },
  { word: "Meretricious", pronunciation: "meh-reh-TRISH-us", pos: "adjective", etymology: "Latin meretrix, prostitute, from merere, to earn", definition: "Apparently attractive but having in reality no value or integrity; falsely alluring.", example: "The pitch was meretricious — glossy slides concealing a hollow idea." },
  { word: "Nacreous", pronunciation: "NAY-kree-us", pos: "adjective", etymology: "French nacre, mother-of-pearl", definition: "Having a pearly luster; iridescent like mother-of-pearl.", example: "The winter clouds turned nacreous at dusk, shot through with pink and gold." },
  { word: "Obdurate", pronunciation: "OB-dyoo-rit", pos: "adjective", etymology: "Latin obdurare, to harden", definition: "Stubbornly refusing to change one's opinion or course of action.", example: "Despite every appeal, he remained obdurate in his refusal." },
  { word: "Pareidolia", pronunciation: "pair-ih-DOH-lee-uh", pos: "noun", etymology: "Greek para-, beside + eidolon, image", definition: "The tendency to perceive a specific, meaningful image in a random or ambiguous visual pattern.", example: "The face he saw in the knotted wood was pure pareidolia, but it unnerved him anyway." },
  { word: "Rimose", pronunciation: "RY-mohs", pos: "adjective", etymology: "Latin rima, a crack or fissure", definition: "Full of fissures, cracks, or crevices.", example: "The old bark was rimose and rough, home to a small civilization of insects." },
  { word: "Sempiternal", pronunciation: "sem-pih-TER-nul", pos: "adjective", etymology: "Latin semper, always + aeternus, eternal", definition: "Eternal and unchanging; everlasting.", example: "The bureaucracy felt sempiternal — no one could remember it not existing." },

  { word: "Canard", pronunciation: "kuh-NARD", pos: "noun", etymology: "French canard, duck (from the phrase vendre des canards, to half-sell ducks)", definition: "An unfounded rumor or story; a false or misleading report.", example: "The canard about the company's solvency was circulating long before the actual crisis." },
  { word: "Gaunt", pronunciation: "gawnt", pos: "adjective", etymology: "Middle English, possibly from Old Norse gand, a thin stick", definition: "Lean and haggard, especially from suffering or age; bleak and desolate.", example: "The gaunt ridgeline above the treeline looked like a drawing, not a real place." },
  { word: "Impugn", pronunciation: "im-PYOON", pos: "verb", etymology: "Latin impugnare, to fight against", definition: "To dispute the truth, validity, or honesty of; to call into question.", example: "She impugned the methodology without quite saying the results were wrong." },
  { word: "Nescience", pronunciation: "NES-ee-ents", pos: "noun", etymology: "Latin nescientia, from nescire, not to know", definition: "Lack of knowledge or awareness; ignorance.", example: "His confident nescience on the subject was more dangerous than admitted uncertainty." },
  { word: "Salient", pronunciation: "SAY-lee-ent", pos: "adjective", etymology: "Latin salire, to leap", definition: "Most noticeable or important; prominent.", example: "The most salient detail of the account had been buried in the final paragraph." },
  { word: "Truculent", pronunciation: "TRUK-yoo-lent", pos: "adjective", etymology: "Latin truculentus, from trux, fierce", definition: "Eager or quick to argue or fight; aggressively defiant.", example: "His truculent response to a simple question set the tone for the whole meeting." },
  { word: "Vicissitude", pronunciation: "vih-SIS-ih-tood", pos: "noun", etymology: "Latin vicissitudo, from vicis, change or turn", definition: "A change of circumstances or fortune, typically unwelcome; the ups and downs of life.", example: "He'd weathered enough vicissitude to stop being surprised by either good news or bad." },
  { word: "Tendresse", pronunciation: "tahn-DRESS", pos: "noun", etymology: "French tendresse, from tendre, tender", definition: "A tender feeling; fondness; a particular affection for something.", example: "He had a quiet tendresse for old maps and the worlds they imagined." },
  { word: "Jocularity", pronunciation: "jok-yoo-LAR-ih-tee", pos: "noun", etymology: "Latin jocularis, from joculus, a little joke", definition: "The quality of being fond of joking; humor.", example: "His jocularity made him popular, but it occasionally undercut his authority." },
  { word: "Harangue", pronunciation: "huh-RANG", pos: "noun", etymology: "Old French harangue, possibly from Germanic hring, ring (as in a gathering)", definition: "A lengthy and aggressive speech; a tirade.", example: "The manager's harangue lasted twenty minutes and changed nothing." },
  { word: "Jingoism", pronunciation: "JING-go-iz-um", pos: "noun", etymology: "From 'by jingo', a mild oath used in a 19th-century British music hall song", definition: "Extreme patriotism, especially in the form of aggressive foreign policy.", example: "The editorial tipped from patriotism into jingoism around the third paragraph." },
];

const POS_COLOR = { noun: "#6B7FD7", verb: "#5BAD8A", adjective: "#C47A3B", adverb: "#9B6BB5" };

// ── Storage helpers ──────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function getDayIndex() {
  const now = new Date();
  const start = new Date(2024, 0, 1);
  const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return diff % WORDS.length;
}

// ── Streak ───────────────────────────────────────────────────────
function updateStreak() {
  const today = todayStr();
  let streak = load('lex_streak', { count: 0, last: null });
  if (streak.last === today) return streak.count;
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  })();
  streak.count = (streak.last === yesterday) ? streak.count + 1 : 1;
  streak.last = today;
  save('lex_streak', streak);
  return streak.count;
}

// ── Dictionary ───────────────────────────────────────────────────
function getDict() { return load('lex_dict', {}); }
function saveDict(d) { save('lex_dict', d); }

function isWordSaved(word) { return !!getDict()[word]; }

function saveWord(word) {
  const dict = getDict();
  if (!dict[word]) {
    dict[word] = { savedOn: todayStr(), usedDates: [], streak: 0 };
    saveDict(dict);
  }
}

function markUsed(word) {
  const dict = getDict();
  if (!dict[word]) return;
  const today = todayStr();
  const entry = dict[word];
  if (entry.usedDates.includes(today)) return;
  entry.usedDates.push(today);
  // compute streak
  const sorted = [...entry.usedDates].sort();
  let streak = 1;
  for (let i = sorted.length - 1; i > 0; i--) {
    const a = new Date(sorted[i-1]), b = new Date(sorted[i]);
    const diffDays = Math.round((b - a) / 86400000);
    if (diffDays === 1) streak++;
    else break;
  }
  entry.streak = streak;
  saveDict(dict);
}

function usedToday(word) {
  const dict = getDict();
  return dict[word] && dict[word].usedDates.includes(todayStr());
}

function removeWord(word) {
  const dict = getDict();
  delete dict[word];
  saveDict(dict);
}

// ── Render helpers ───────────────────────────────────────────────
function posTag(pos) {
  const c = POS_COLOR[pos] || '#888';
  return `<span class="pos-tag" style="color:${c};background:${c}18;border:1px solid ${c}40">${pos}</span>`;
}

function renderToday() {
  const idx = getDayIndex();
  const w = WORDS[idx];
  const c = POS_COLOR[w.pos] || '#888';
  const saved = isWordSaved(w.word);
  const used = usedToday(w.word);

  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  document.getElementById('wordCard').innerHTML = `
    <div class="word-headline">
      <span class="word-title">${w.word}</span>
      ${posTag(w.pos)}
    </div>
    <div class="pronunciation">${w.pronunciation}</div>
    <div class="etymology">${w.etymology}</div>
    <div class="definition">${w.definition}</div>
    <div class="example-wrap">
      <div class="example-bar" style="background:${c}60"></div>
      <div class="example-text">"${w.example}"</div>
    </div>
    <div class="card-actions">
      <button class="btn btn-save ${saved ? 'saved' : ''}" id="btnSave" onclick="onSave('${w.word}')">
        ${saved ? '✓ Saved' : '＋ Save to Dictionary'}
      </button>
      <button class="btn btn-used ${used ? 'done' : ''}" id="btnUsed" onclick="onUsed('${w.word}')">
        ${used ? '✓ Used it today' : '💬 Used it!'}
      </button>
    </div>
  `;

  document.getElementById('metaLine').textContent = `New word every day · ${WORDS.length} words in rotation`;
}

function onSave(word) {
  if (isWordSaved(word)) return;
  saveWord(word);
  renderToday();
  updateDictBadge();
}

function onUsed(word) {
  if (!isWordSaved(word)) { saveWord(word); }
  markUsed(word);
  renderToday();
  if (document.getElementById('page-dictionary').classList.contains('active')) renderDictionary();
}

function onUsedFromDict(word) {
  markUsed(word);
  renderDictionary();
}

function onRemove(word) {
  removeWord(word);
  renderDictionary();
  updateDictBadge();
  renderToday();
}

// ── History ──────────────────────────────────────────────────────
let historyShown = 7;

function renderHistory() {
  const idx = getDayIndex();
  const container = document.getElementById('historyContent');
  if (idx === 0) {
    container.innerHTML = `<div class="empty-state">No history yet.<small>Come back tomorrow for your first entry.</small></div>`;
    return;
  }
  const dict = getDict();
  const count = Math.min(historyShown, idx);
  let html = '<div class="history-list">';
  for (let i = 0; i < count; i++) {
    const w = WORDS[idx - 1 - i];
    const c = POS_COLOR[w.pos] || '#888';
    const daysAgo = i + 1;
    const inDict = !!dict[w.word];
    const usedCount = inDict ? dict[w.word].usedDates.length : 0;
    html += `
      <div class="history-card">
        <div class="hw">
          <div><span class="history-word">${w.word}</span><span class="history-pos" style="color:${c}">${w.pos}</span></div>
          <div class="history-def">${w.definition}</div>
        </div>
        <div class="history-meta">
          ${daysAgo === 1 ? 'yesterday' : daysAgo + 'd ago'}
          ${inDict ? `<br><span style="color:var(--verb)">saved</span>` : ''}
          ${usedCount > 0 ? `<br><span style="color:var(--text4)">used ${usedCount}×</span>` : ''}
        </div>
      </div>`;
  }
  html += '</div>';
  if (count < idx) {
    html += `<button class="load-more" onclick="loadMoreHistory()">Load more</button>`;
  }
  container.innerHTML = html;
}

function loadMoreHistory() {
  historyShown += 7;
  renderHistory();
}

// ── Dictionary ───────────────────────────────────────────────────
function renderDictionary() {
  const dict = getDict();
  const keys = Object.keys(dict);
  const container = document.getElementById('dictContent');
  const nudge = document.getElementById('nudgeBanner');
  const label = document.getElementById('dictLabel');

  label.textContent = `Saved words · ${keys.length}`;

  if (keys.length === 0) {
    nudge.innerHTML = '';
    container.innerHTML = `<div class="empty-state">Nothing saved yet.<small>Hit "Save to Dictionary" on today's word to get started.</small></div>`;
    return;
  }

  // Recency nudge — saved but not used in 3+ days
  const today = new Date();
  const stale = keys.filter(word => {
    const entry = dict[word];
    if (entry.usedDates.length === 0) {
      const saved = new Date(entry.savedOn.replace(/-/g, '/'));
      const diff = Math.floor((today - saved) / 86400000);
      return diff >= 2;
    }
    const lastUsed = new Date(entry.usedDates.at(-1).replace(/-/g, '/'));
    const diff = Math.floor((today - lastUsed) / 86400000);
    return diff >= 3;
  });

  if (stale.length > 0) {
    nudge.innerHTML = `
      <div class="nudge-banner">
        <strong>Unused words</strong>
        These words haven't been used recently — try working one into a conversation today.
        <div class="nudge-words">${stale.map(w => `<span class="nudge-chip">${w}</span>`).join('')}</div>
      </div>`;
  } else {
    nudge.innerHTML = '';
  }

  // Sort: most recently saved first
  const sorted = keys.sort((a, b) => {
    const da = dict[a].savedOn, db = dict[b].savedOn;
    return da < db ? 1 : da > db ? -1 : 0;
  });

  let html = '<div class="dict-list">';
  for (const word of sorted) {
    const entry = dict[word];
    const wData = WORDS.find(w => w.word === word);
    if (!wData) continue;
    const c = POS_COLOR[wData.pos] || '#888';
    const usedTd = usedToday(word);
    const useCount = entry.usedDates.length;
    const streak = entry.streak || 0;

    html += `
      <div class="dict-card">
        <div class="dict-card-top">
          <div>
            <span class="dict-word">${word}</span>
            <span class="dict-pos" style="color:${c}">${wData.pos}</span>
          </div>
          <div class="dict-actions">
            <button class="btn-sm ${usedTd ? 'used-today' : ''}" onclick="onUsedFromDict('${word}')">
              ${usedTd ? '✓ Used today' : '💬 Used it'}
            </button>
            <button class="btn-sm btn-remove" onclick="onRemove('${word}')" title="Remove">✕</button>
          </div>
        </div>
        <div class="dict-def">${wData.definition}</div>
        <div class="dict-stats">
          <span>Used <strong>${useCount}</strong> time${useCount !== 1 ? 's' : ''}</span>
          ${streak > 1 ? `<span class="dict-stat-streak">🔥 ${streak}-day streak</span>` : ''}
          <span style="margin-left:auto">Saved ${entry.savedOn}</span>
        </div>
      </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function updateDictBadge() {
  const dict = getDict();
  const count = Object.keys(dict).length;
  const badge = document.getElementById('dictCount');
  if (count > 0) { badge.textContent = count; badge.style.display = 'inline'; }
  else { badge.style.display = 'none'; }
}

// ── Navigation ───────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const btns = document.querySelectorAll('nav button');
  const map = { today: 0, history: 1, dictionary: 2 };
  btns[map[name]].classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'dictionary') renderDictionary();
}

// ── Init ─────────────────────────────────────────────────────────
const streak = updateStreak();
document.getElementById('streakNum').textContent = streak;
renderToday();
updateDictBadge();
</script>
</body>
</html>
